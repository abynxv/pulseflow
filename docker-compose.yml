services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://parseflow:parseflow@db:5432/parseflow
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parseflow
      POSTGRES_PASSWORD: parseflow
      POSTGRES_DB: parseflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parseflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
